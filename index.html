<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>学生管理系统</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        textarea { 
            width: 100%; 
            height: 150px;  /* 输入框变高 */
            padding: 0.5rem; 
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        button { padding: 0.5rem 1rem; cursor: pointer; font-size: 1rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 2rem; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f5f5f5; }
        .hint { color: #666; font-size: 0.9rem; margin-bottom: 0.5rem; }
    </style>
</head>
<body>
    <h1>学生管理系统</h1>
    
    <div class="form-group">
        <label class="hint">请输入姓名，每行一个：</label>
        <textarea id="names" placeholder="张三&#10;李四&#10;王五"></textarea>
        <button onclick="addStudents()">批量添加</button>
    </div>

    <table>
        <thead>
            <tr><th>ID</th><th>姓名</th><th>添加时间</th></tr>
        </thead>
        <tbody id="student-list"></tbody>
    </table>

    <script>
        // 加载数据
        async function loadStudents() {
            const res = await fetch('/api/students');
            const data = await res.json();
            const tbody = document.getElementById('student-list');
            tbody.innerHTML = data.map(s => `
                <tr>
                    <td>${s.id}</td>
                    <td>${s.name}</td>
                    <td>${s.created_at}</td>
                </tr>
            `).join('');
        }

        // 批量添加学生
        async function addStudents() {
            const textarea = document.getElementById('names');
            // 按换行分割，过滤空行
            const names = textarea.value.split('\n').map(n => n.trim()).filter(n => n);
            
            if (names.length === 0) {
                alert('请输入至少一个姓名');
                return;
            }

            // 批量发送
            await fetch('/api/students', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ names: names })
            });
            
            textarea.value = '';  // 清空输入框
            loadStudents();       // 刷新列表
        }

        // 初始化
        loadStudents();
    </script>
</body>
</html>
